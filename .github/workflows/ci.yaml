name: Bookstore Backend CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run Unit Tests
        run: mvn clean test

      - name: Build Docker Image
        run: |
          docker build -t bookstore-app:${{ github.sha }} .
          echo "Docker Image built successfully!"

      - name: Run Unit Tests
        env:
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUD_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUD_API_SECRET }}
        run: mvn clean test