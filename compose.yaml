services:
  grafana-lgtm:
    image: 'grafana/otel-lgtm:latest'
    ports:
      - '3000:3000'
      - '4317'
      - '4318'
  mysql-db:
    image: 'mysql:8.0'
    container_name: bookstore-db
    ports:
      - '3306:3306'
    environment:
      - MYSQL_ROOT_PASSWORD=123456
      - MYSQL_DATABASE=bookstore
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:


