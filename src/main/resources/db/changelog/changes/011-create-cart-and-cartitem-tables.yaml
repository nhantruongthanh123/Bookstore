databaseChangeLog:
  - changeSet:
      id: create-carts-and-items-tables
      author: nhan
      changes:
        - createTable:
            tableName: carts
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    unique: true
                    foreignKeyName: fk_cart_user
                    referencedTableName: users
                    referencedColumnNames: id

        - createTable:
            tableName: cart_items
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: cart_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_cart_item_cart
                    referencedTableName: carts
                    referencedColumnNames: id
              - column:
                  name: book_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_cart_item_book
                    referencedTableName: books
                    referencedColumnNames: id
              - column:
                  name: quantity
                  type: INT
                  constraints:
                    nullable: false