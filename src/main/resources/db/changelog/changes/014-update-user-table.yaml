databaseChangeLog:
  - changeSet:
      id: update-user-table
      author: nhan
      changes:
        - addColumn:
            tableName: users
            columns:
              - column:
                  name: avatar
                  type: varchar(500)
              - column:
                  name: address
                  type: varchar(500)
              - column:
                  name: date_of_birth
                  type: date
              - column:
                  name: gender
                  type: varchar(20)