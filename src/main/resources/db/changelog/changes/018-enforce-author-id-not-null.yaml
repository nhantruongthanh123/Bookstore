databaseChangeLog:
  - changeSet:
      id: 018-enforce-book-author-mapping
      author: nhan
      preConditions:
        - onFail: HALT
        - onError: HALT
        - sqlCheck:
            expectedResult: 0
            sql: |
              SELECT COUNT(*)
              FROM books
              WHERE author IS NOT NULL
                AND NOT EXISTS (
                  SELECT 1
                  FROM book_author ba
                  WHERE ba.book_id = books.id
                )
      changes:
        - createIndex:
            tableName: book_author
            indexName: idx_book_author_book_id
            columns:
              - column:
                  name: book_id
