spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml

spring.cache.type=none
spring.data.redis.repositories.enabled=false
spring.docker.compose.enabled=false

cloudinary.cloud-name=${CLOUD_NAME:test-cloud}
cloudinary.api-key=${CLOUD_API_KEY:test-key}
cloudinary.api-secret=${CLOUD_API_SECRET:test-secret}

jwt.secret=${JWT_SECRET:test-jwt-secret-key-for-testing-purposes-only}
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:test-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:test-client-secret}

app.oauth2.authorized-redirect-uri=http://localhost:3000/oauth2/redirect
app.frontend.login-url=http://localhost:3000/login